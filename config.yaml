    - wage transparency
    - pay transparency
    - salary disclosure
    - compensating differentials
    - job quality
    - firm culture
    - employer reviews
    - glassdoor
    - kununu
    - rent sharing
    - rent-sharing
    - profit sharing
    - AI employment
    - AI unemployment
    - LLM labor
    - LLM labour
    - ChatGPT employment
    - automation unemployment
    - directed search
    - job search behavior
    - job search behaviour
    - reservation wage
    - application behavior
    - application behaviour
    - employer attractiveness
    - workplace amenities
  moderate:  # Relevant context — boost but don't auto-include
    - labour market
    - labor market
    - wage inequality
    - wage dispersion
    - monopsony
    - wage bargaining
    - job amenities
    - working conditions
    - fringe benefits
    - employee benefits
