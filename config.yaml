# Paper sources to scrape
paper_sources:
  - nber
  - arxiv_econ
  - cepr
  - iza
  - fed_banks

# Conference sources to scrape
conference_sources:
  - inomics
  - confservice
  - nber_conf
  - wikicfp
  - eea

# Email settings
email:
  recipient: "${RECIPIENT_EMAIL}"  # Set via environment variable or GitHub secret
  sender_name: "Econ Updater"
  subject_prefix: "[Econ Digest]"

# Schedule
schedule:
  day: monday
  time_cet: "08:30"
  time_utc: "07:30"  # CET = UTC+1 (winter) / UTC+2 (summer)

# LLM settings (for relevance scoring)
llm:
  provider: anthropic  # or openai
  model: claude-haiku-4-5-20251001  # cheap + fast for scoring
  min_relevance_score: 0.6  # 0-1, papers below this are excluded
  min_conference_score: 0.6  # 0-1, conferences below this are excluded
  max_papers_in_digest: 25  # cap to keep email readable

# How far back to look for new papers (days)
lookback_days: 8  # slightly more than a week to catch stragglers
