# =============================================================================
# Econ Updater — Configuration
# =============================================================================

# Your research profile (used by the LLM to score relevance)
research_profile: |
  I am a PhD student in micro labour economics at ETH Zurich / KOF Swiss Economic Institute.
  My research covers:
  - Minimum wages and non-wage compensation (Germany, using employer review data)
  - Wage transparency and wage posting decisions (survey experiments, structural models)
  - AI/LLMs and unemployment (event study using Swiss admin data)
  - Firm culture, job quality, and job search behaviour (Swiss admin data)
  - Firm rent-sharing through wages and non-wage amenities (shift-share IV, energy prices)

  Key themes: compensating differentials, non-wage amenities, directed search,
  applied microeconometrics (DiD, event studies, IV, LASSO, structural estimation),
  employer review / crowdsourced data, labour markets in Germany and Switzerland.

# JEL codes for filtering (primary + adjacent)
jel_codes:
  primary:
    - J31  # Wage level, structure, differentials
    - J32  # Non-wage labour costs and benefits
    - J33  # Compensation packages, payment methods
    - J38  # Minimum wage
    - J63  # Turnover, vacancies, layoffs
    - J64  # Unemployment
    - J23  # Labour demand
    - J24  # Human capital, skills
    - M51  # Firm employment decisions, promotions
    - M52  # Compensation, methods of payment
    - D83  # Search, learning, information
    - O33  # Technological change
  adjacent:
    - J21  # Labour force and employment
    - J61  # Geographic labour mobility
    - J71  # Discrimination
    - J08  # Labour standards (national/international)
    - C21  # Cross-sectional models
    - C23  # Panel data models
    - C26  # Instrumental variables
    - C36  # Structural models

