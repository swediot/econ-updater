name: Weekly Econ Digest

on:
  schedule:
    # Monday 07:30 UTC = 08:30 CET (winter) / 09:30 CEST (summer)
    # Adjust to 06:30 UTC during summer time if you want exactly 08:30 CEST
    - cron: '30 7 * * 1'

  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore seen papers cache
        uses: actions/cache@v4
        with:
          path: data/seen.json
          key: seen-papers-${{ github.run_number }}
          restore-keys: |
            seen-papers-

      - name: Run digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py --save-html

      - name: Upload digest preview
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: digest-preview
          path: data/preview.html
          retention-days: 30

      - name: Save seen papers cache
        uses: actions/cache/save@v4
        if: success()
        with:
          path: data/seen.json
          key: seen-papers-${{ github.run_number }}
